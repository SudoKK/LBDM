<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lynn's Birthday Sandbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body>

    <div class="crt-overlay"></div>
    <div class="scanlines"></div>

    <div id="ui-layer">
        
        <!-- Retro Landing Screen -->
        <div id="landing-screen">
            <div id="stars-container">
                <div class="star"></div><div class="star"></div><div class="star"></div>
                <div class="star"></div><div class="star"></div><div class="star"></div>
            </div>
            <div class="landing-content">
                <h1 class="landing-title">IT'S LYNN'S BIRTHDAY</h1>
                <h2 class="landing-subtitle">SATURDAY, 25TH OF APRIL</h2>
                <button id="start-game-btn" class="retro-btn start-btn">STORY MODE</button>
            </div>
        </div>

        <header class="status-bar">
            <div>LYNN'S FUN HANGOUT</div>
            <div class="blink" style="color: var(--accent-neon-green)">USE W A S D OR JOYSTICK TO EXPLORE</div>
        </header>

        <div id="dialog-container" class="dialog-container hidden">
            <div class="dialog-box">
                <div id="dialog-icon" class="quest-icon">🎯</div>
                <div class="quest-details">
                    <h3 id="dialog-title">TITLE</h3>
                    <p id="dialog-text">Text</p>
                </div>
            </div>
        </div>

        <div id="rsvp-modal" class="modal hidden">
            <div class="modal-content dialog-box">
                <h2>🏆 QUEST ACCEPTED 🏆</h2>
                <p>Enter your name below to officially reserve your spot on the roster! 😄</p>

                <!-- Hidden iframe to prevent google forms from redirecting the page -->
                <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"
                    onload="if(window.submitted) { document.getElementById('rsvp-form-container').innerHTML = '<h3 style=\'color: var(--accent-neon-green); margin-top:20px;\'>SUCCESS! YOU ARE ON THE LIST!</h3><br><button id=\'close-modal-btn2\' class=\'retro-btn sm-btn\'>AWESOME</button>'; document.getElementById('close-modal-btn2').onclick = function() { document.getElementById('rsvp-modal').classList.add('hidden'); } }"></iframe>

                <div id="rsvp-form-container" style="width: 100%;">
                    <form action="https://docs.google.com/forms/d/e/1FAIpQLSfKGvS_xS952WJDdqs2X-jk6CSx38KFGC91uXxeqgToRNlQ7A/formResponse" method="POST" target="hidden_iframe"
                        onsubmit="window.submitted=true;"
                        style="display:flex; flex-direction:column; gap:10px; align-items:center;">
                        <input type="text" name="entry.1424588134" placeholder="Your Name" class="retro-input" required>
                        <input type="tel" name="entry.1823815556" placeholder="Phone Number" class="retro-input" required>
                        <div style="display:flex; gap: 1rem; margin-top: 15px;">
                            <button type="submit" class="retro-btn sm-btn">SUBMIT</button>
                            <button type="button" id="close-modal-btn" class="retro-btn sm-btn"
                                style="background-color: var(--accent-neon-pink);">CANCEL</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div id="joystick-zone">
            <div id="joystick-base">
                <div id="joystick-stick"></div>
            </div>
            <div id="action-btn" class="action-btn">A</div>
        </div>
    </div>

    <!-- The Game World Viewport -->
    <div id="game-viewport">
        <div id="world">

            <div class="ground-pattern"></div>

            <!-- SVG Trails -->
            <svg id="trail-layer" width="2000" height="2000">
                <path id="trail-path" class="trail-line" d=""></path>
            </svg>

            <!-- Dynamically generated Nature -->
            <div id="nature-layer"></div>

            <!-- Points of Interest -->
            <div class="poi" id="poi-intro" data-type="intro">
                <div class="poi-sprite">🏛️</div>
                <div class="poi-label">READ ME</div>
            </div>
            <div class="poi" id="poi-paintball" data-type="paintball">
                <div class="poi-sprite">⛺</div>
                <div class="poi-label">PAINTBALL</div>
            </div>
            <div class="poi" id="poi-pottery" data-type="pottery">
                <div class="poi-sprite">🛖</div>
                <div class="poi-label">POTTERY</div>
            </div>
            <div class="poi" id="poi-picnic" data-type="picnic">
                <div class="poi-sprite">🌳</div>
                <div class="poi-label">PICNIC</div>
            </div>
            <div class="poi" id="poi-cake" data-type="cake">
                <div class="poi-sprite">🎪</div>
                <div class="poi-label">CAKE</div>
            </div>
            <div class="poi" id="poi-rsvp" data-type="rsvp">
                <div class="poi-sprite">📬</div>
                <div class="poi-label">RSVP</div>
            </div>

            <!-- The Player Sprite -->
            <div id="player">
                <div class="player-sprite">🚶</div>
                <div class="player-shadow"></div>
            </div>

        </div>
    </div>

    <script src="script.js?v=2"></script>
</body>

</html>
